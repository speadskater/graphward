name: Bug report
description: Report a reproducible Graphward problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private source, credentials, repository paths, or database files.
  - type: input
    id: version
    attributes:
      label: Graphward version
      placeholder: 0.10.1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, and coding-agent client if relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include relevant `graphward doctor` output or logs after removing sensitive information.
